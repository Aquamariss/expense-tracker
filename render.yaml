services:
  - type: web
    name: expense-tracker
    runtime: node
    plan: free
    buildCommand: npm install --include=dev && npm run build
    startCommand: node node_modules/.bin/next start -p $PORT -H 0.0.0.0
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "22"
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"
